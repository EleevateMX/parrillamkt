  async get() {
    if (!SHEETS_API_URL) return MOCK_PROPOSALS;
    const res  = await fetch(SHEETS_API_URL + "?action=getProposals");
    const data = await res.json();
    return data.proposals || [];
  },
  async add(proposal) {
    if (!SHEETS_API_URL) return { id: Date.now() };
    const res  = await fetch(SHEETS_API_URL, { method:'POST',
      body: JSON.stringify({ action:'addProposal', proposal }) });
    return res.json();
  },
  async updateStatus(id, status, notes) {
    if (!SHEETS_API_URL) return { success: true };
    const res = await fetch(SHEETS_API_URL, { method:'POST',
      body: JSON.stringify({ action:'updateStatus', id, status, notes }) });
    return res.json();
  },
};

  // Cargar propuestas desde Sheets (o mock si no hay URL)
  useEffect(() => {
    if (!user) return;
    setLoading(true);
    api.get()
      .then(data => setProposals(data))
      .catch(() => setProposals(MOCK_PROPOSALS))
      .finally(() => setLoading(false));

  const showNotif = (msg, type='success') => {
