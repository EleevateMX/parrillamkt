// ── NEW PROPOSAL ──────────────────────────────────────────
function NewProposalPage({proposals,setProposals,setView,user,showNotif}){
  const [form,setForm]=useState({title:'',type:'reel',week:'Semana 1',day:'Lunes',time:'12:00',img:'',caption:'',hashtags:'',cta:'',target:'',budget:''});
  const [preview,setPreview]=useState(false);
  const [saving,setSaving]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const inp={width:'100%',background:C.bg2,border:`1px solid ${C.lineM}`,borderRadius:12,padding:'10px 14px',color:C.ink,fontSize:13,outline:'none'};
  const lbl={fontSize:10,color:C.dim,fontWeight:700,textTransform:'uppercase',letterSpacing:.8,marginBottom:6,display:'block'};
  const prevP={...form,hashtags:form.hashtags.split(/[\s,]+/).filter(Boolean),img:form.img||'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400&h=500&fit=crop'};
  const submit=async()=>{
    if(!form.title||!form.caption){showNotif('Completa título y caption','error');return;}
    setSaving(true);
    const np={title:form.title,type:form.type,author:user.name,av:user.av,acColor:user.color,week:form.week,day:form.day,time:form.time,caption:form.caption,img:form.img||'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400&h=500&fit=crop',hashtags:form.hashtags.split(/[\s,]+/).filter(Boolean),cta:form.cta,target:form.target,platform:'Instagram',date:new Date().toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'}),notes:'',reach:'—',budget:form.budget?parseInt(form.budget):null};
    const r=await api.add(np);
    setProposals(ps=>[...ps,{...np,id:r.id||Date.now(),status:'pending'}]);
    showNotif('✅ Propuesta enviada para revisión','success');
    setSaving(false);setView('proposals');
  };
  return e('div',{className:'page',style:{padding:'26px 30px',maxWidth:980}},
    e('div',{style:r({justifyContent:'space-between',marginBottom:24})},
      e('div',null,e('h1',{style:{fontSize:22,fontWeight:900,color:C.ink,margin:'0 0 4px'}},'Nueva Propuesta'),e('div',{style:{fontSize:13,color:C.dim}},'Crea una propuesta para la parrilla semanal')),
      e(Btn,{sm:true,onClick:()=>setPreview(!preview)},preview?e(React.Fragment,null,e(IC.X,{size:13}),' Ocultar'):e(React.Fragment,null,e(IC.Eye,{size:13}),' Vista previa'))),
    e('div',{style:r({gap:28,alignItems:'flex-start'})},
      e('div',{style:{flex:1,minWidth:0}},
        e('div',{style:{marginBottom:14}},e('label',{style:lbl},'Título'),e('input',{value:form.title,onChange:ev=>set('title',ev.target.value),placeholder:'Ej: Reel: Top 5 misiones épicas',style:inp})),
        e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:10,marginBottom:14}},
          [{k:'type',label:'Tipo',opts:Object.keys(TYPE),fn:k=>TYPE[k].label},{k:'week',label:'Semana',opts:WEEKS},{k:'day',label:'Día',opts:DAYS}]
            .map(f=>e('div',{key:f.k},e('label',{style:lbl},f.label),e('select',{value:form[f.k],onChange:ev=>set(f.k,ev.target.value),style:{...inp,cursor:'pointer'}},f.opts.map(o=>e('option',{key:o,value:o},f.fn?f.fn(o):o))))),
          e('div',{key:'time'},e('label',{style:lbl},'Hora'),e('input',{type:'time',value:form.time,onChange:ev=>set('time',ev.target.value),style:inp}))),
        e('div',{style:{marginBottom:14}},e('label',{style:lbl},'URL de imagen'),e('input',{value:form.img,onChange:ev=>set('img',ev.target.value),placeholder:'https://… (opcional)',style:inp})),
        e('div',{style:{marginBottom:14}},e('label',{style:lbl},'Caption'),e('textarea',{value:form.caption,onChange:ev=>set('caption',ev.target.value),rows:4,placeholder:'Escribe el copy del post…',style:{...inp,resize:'vertical'}})),
        e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}},
          e('div',null,e('label',{style:lbl},'Hashtags'),e('input',{value:form.hashtags,onChange:ev=>set('hashtags',ev.target.value),placeholder:'#GTAHUB, #GTA5',style:inp})),
          e('div',null,e('label',{style:lbl},'Call to Action'),e('input',{value:form.cta,onChange:ev=>set('cta',ev.target.value),placeholder:'Link en bio',style:inp}))),
        e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:22}},
          e('div',null,e('label',{style:lbl},'Target'),e('input',{value:form.target,onChange:ev=>set('target',ev.target.value),placeholder:'Gamers 18–28, México',style:inp})),
          e('div',null,e('label',{style:lbl},'Presupuesto MXN'),e('input',{type:'number',value:form.budget,onChange:ev=>set('budget',ev.target.value),placeholder:'0',style:inp}))),
        e('div',{style:r({gap:10})},
          e(Btn,{v:'primary',onClick:submit,style:{opacity:saving?.7:1}},saving?'Guardando…':e(React.Fragment,null,e(IC.Zap,{size:14}),' Enviar propuesta')),
          e(Btn,{onClick:()=>setView('proposals')},'Cancelar'))),
      preview&&e('div',{style:{flexShrink:0}},e(IGPreview,{proposal:prevP}))));
}

// ── PARRILLA ──────────────────────────────────────────────
function ParrillaPage({proposals,setView,setSelected}){
  const [weekF,setWeekF]=useState('Semana 1');
  const wps=proposals.filter(p=>p.week===weekF);
  return e('div',{className:'page',style:{padding:'24px 28px'}},
    e('div',{style:r({justifyContent:'space-between',marginBottom:22})},
      e('div',null,e('h1',{style:{fontSize:22,fontWeight:900,color:C.ink,margin:'0 0 4px'}},'Parrilla Semanal'),e('div',{style:{fontSize:13,color:C.dim}},'Calendario · ',weekF)),
      e('div',{style:r({gap:6})},WEEKS.map(w=>e('button',{key:w,onClick:()=>setWeekF(w),style:{padding:'8px 13px',borderRadius:10,fontSize:11,fontWeight:700,cursor:'pointer',background:weekF===w?`${C.blue}22`:C.bg2,border:weekF===w?`1px solid ${C.blue}45`:`1px solid ${C.line}`,color:weekF===w?C.blueB:C.dim}},w)))),
    e('div',{style:{display:'grid',gridTemplateColumns:'56px repeat(7,1fr)',gap:8}},
      e('div'),
      DAYS.map(d=>e('div',{key:d,style:{padding:'8px 4px',textAlign:'center',fontSize:10,fontWeight:700,color:C.dim,textTransform:'uppercase',letterSpacing:.8}},d.substring(0,3))),
      e('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:12}},e('span',{style:{fontSize:10,color:C.blueB,fontWeight:700,textTransform:'uppercase'}},weekF.replace('Semana','S'))),
      DAYS.map(day=>{
        const dayPs=wps.filter(p=>p.day===day);
        return e('div',{key:day,style:{minHeight:130,background:C.bg2,border:`1px solid ${C.line}`,borderRadius:14,padding:7,display:'flex',flexDirection:'column',gap:6}},
          dayPs.length===0&&e('div',{style:{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:C.mute,fontSize:12}},'—'),
          dayPs.map(p=>{
            const sc=STATUS[p.status],TC=TYPE[p.type];
            return e('button',{key:p.id,onClick:()=>{setSelected(p);setView('proposal-detail');},style:{display:'flex',flexDirection:'column',gap:2,padding:'7px 9px',background:`${sc.color}15`,border:`1px solid ${sc.color}30`,borderRadius:10,cursor:'pointer',textAlign:'left',width:'100%'}},
              e('div',{style:{fontSize:9,fontWeight:800,color:sc.color,textTransform:'uppercase',letterSpacing:.5}},p.time),
              e('div',{style:{fontSize:10,fontWeight:700,color:C.ink,lineHeight:1.4,overflow:'hidden'}},p.title.replace(/^[^:]+: /,'')),
              e('div',{style:r({gap:4})},TC&&e(TC.Icon,{size:8,color:TC.color}),e('span',{style:{fontSize:8,color:C.dim}},p.author)));
          }));
      }),
      [2,3,4].flatMap(n=>[
        e('div',{key:`l${n}`,style:{display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:12}},e('span',{style:{fontSize:10,color:C.mute,fontWeight:700}},`S${n+1}`)),
        ...DAYS.map(d=>e('div',{key:`${n}${d}`,style:{minHeight:60,background:`${C.bg2}55`,border:`1px dashed ${C.line}`,borderRadius:14}}))
      ])),
    e('div',{style:r({gap:16,marginTop:18,flexWrap:'wrap'})},
      Object.entries(STATUS).map(([k,v])=>e('div',{key:k,style:r({gap:6})},
        e('div',{style:{width:10,height:10,borderRadius:3,background:v.color,boxShadow:`0 0 6px ${v.color}66`}}),
        e('span',{style:{fontSize:11,color:C.dim}},v.label)))));
}

// ── TARGETS ───────────────────────────────────────────────

    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}},
      TARGETS.map(t=>e(Card,{key:t.id,style:{padding:'20px',position:'relative',overflow:'hidden'}},
        e('div',{style:{position:'absolute',top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${t.color},${t.color}44)`,borderRadius:'20px 20px 0 0'}}),
        e('div',{style:r({justifyContent:'space-between',marginBottom:16})},
          e('div',null,e('div',{style:{fontSize:16,fontWeight:800,color:C.ink}},t.name),e('div',{style:{fontSize:11,color:C.dim,marginTop:2}},t.platform)),
          e('div',{style:{textAlign:'right'}},e('div',{style:{fontSize:26,fontWeight:900,color:t.color,letterSpacing:-1}},t.size),e('div',{style:{fontSize:9,color:C.mute,textTransform:'uppercase',letterSpacing:.5}},'usuarios est.'))),

// ── ADS ───────────────────────────────────────────────────
function AdsPage(){
  const total=CAMPAIGNS.reduce((s,c)=>s+c.budget,0);
  const spent=CAMPAIGNS.reduce((s,c)=>s+c.spent,0);
  return e('div',{className:'page',style:{padding:'26px 30px',maxWidth:920}},
    e('div',{style:r({justifyContent:'space-between',marginBottom:24})},
      e('div',null,e('h1',{style:{fontSize:22,fontWeight:900,color:C.ink,margin:'0 0 5px'}},'Ads & Campañas'),e('div',{style:{fontSize:13,color:C.dim}},'Presupuesto publicitario · Mayo 2026')),
      e(Btn,{v:'primary',sm:true},e(IC.Plus,{size:13}),' Nueva campaña')),
    e('div',{style:r({gap:14,marginBottom:26,flexWrap:'wrap'})},
      e(Stat,{label:'Presupuesto total',value:`$${total.toLocaleString()}`,Icon:IC.BarChart2,  color:C.gold}),
      e(Stat,{label:'Invertido',        value:`$${spent.toLocaleString()}`,Icon:IC.TrendingUp, color:C.red}),
      e(Stat,{label:'Disponible',       value:`$${(total-spent).toLocaleString()}`,Icon:IC.DollarSign,color:C.green}),
      e(Stat,{label:'Activas',          value:CAMPAIGNS.filter(c=>c.status==='active').length,Icon:IC.Activity,color:C.cyan})),
    e('div',{style:c({gap:12})},
      CAMPAIGNS.map(camp=>{
        const pct=Math.round((camp.spent/camp.budget)*100);
        const sc={active:C.green,completed:C.dim,scheduled:C.cyan}[camp.status];
        const sl={active:'Activa',completed:'Completada',scheduled:'Programada'}[camp.status];
        return e(Card,{key:camp.id,style:{padding:'20px 22px'}},
          e('div',{style:r({gap:16})},
            e('div',{style:{width:4,borderRadius:2,background:`linear-gradient(180deg,${camp.color},${camp.color}44)`,alignSelf:'stretch',flexShrink:0}}),
            e('div',{style:{flex:1,minWidth:0}},
              e('div',{style:r({justifyContent:'space-between',marginBottom:12})},
                e('div',null,
                  e('div',{style:{fontSize:15,fontWeight:800,color:C.ink,marginBottom:4}},camp.name),
                  e('div',{style:r({gap:8,flexWrap:'wrap'})},
                    e('span',{style:{fontSize:11,color:C.dim}},camp.platform),
                    e('span',{style:{fontSize:11,color:C.dim}},'·'),
                    e('span',{style:{fontSize:11,color:C.dim}},camp.startDate,' – ',camp.endDate),
                    e('span',{style:{fontSize:11,color:C.eGrn}},'📊 ',camp.reach))),
                e('div',{style:r({gap:12,alignItems:'center',flexShrink:0})},
                  e('span',{style:{fontSize:11,fontWeight:700,color:sc,background:`${sc}18`,padding:'4px 10px',borderRadius:999,border:`1px solid ${sc}30`}},sl),
                  e('div',{style:{textAlign:'right'}},
                    e('div',{style:{fontSize:18,fontWeight:900,color:camp.color,letterSpacing:-.5}},'$',camp.budget.toLocaleString()),
                    e('div',{style:{fontSize:9,color:C.mute,textTransform:'uppercase',letterSpacing:.5}},'presupuesto')))),
              e('div',{style:{background:C.bg3,borderRadius:6,height:7,overflow:'hidden',marginBottom:6}},
                e('div',{style:{height:'100%',width:`${pct}%`,background:`linear-gradient(90deg,${camp.color},${camp.color}77)`,borderRadius:6}})),
              e('div',{style:r({justifyContent:'space-between'})},
                e('span',{style:{fontSize:10,color:C.dim}},'Gastado: $',camp.spent.toLocaleString()),
                e('span',{style:{fontSize:10,color:camp.color,fontWeight:800}},pct,'%')))));
      })));
}

// ── ROOT APP ──────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [view,setView]=useState('dashboard');
  const [proposals,setProposals]=useState([]);
  const [loading,setLoading]=useState(false);
  const [selected,setSelected]=useState(null);
  const [notif,setNotif]=useState(null);
  useEffect(()=>{
    if(!user) return;
    setLoading(true);
    api.get().then(d=>setProposals(d)).catch(()=>setProposals(MOCK)).finally(()=>setLoading(false));
  },[user]);
  const showNotif=(msg,type='success')=>{setNotif({msg,type});setTimeout(()=>setNotif(null),3200);};
  if(!user) return e(LoginPage,{onLogin:u=>{setUser(u);setView('dashboard');}});
  const pages={
    'dashboard':       ()=>e(DashboardPage,      {proposals,setView,setSelected,user}),
    'proposals':       ()=>e(ProposalsPage,       {proposals,setProposals,setView,setSelected,user,showNotif}),
    'proposal-detail': ()=>selected?e(ProposalDetailPage,{proposal:selected,proposals,setProposals,setView,user,showNotif}):null,
    'new-proposal':    ()=>e(NewProposalPage,     {proposals,setProposals,setView,user,showNotif}),
    'parrilla':        ()=>e(ParrillaPage,        {proposals,setView,setSelected}),
    'targets':         ()=>e(TargetsPage),
    'ads':             ()=>e(AdsPage),
  };
  return e('div',{style:{display:'flex',height:'100vh',background:C.bg,color:C.ink,overflow:'hidden'}},
    e(Sidebar,{view,setView,user,setUser,proposals}),
    e('main',{style:{flex:1,overflow:'auto',position:'relative',background:`radial-gradient(ellipse at 80% 5%,${C.blue}06 0%,transparent 50%),${C.bg}`}},
      notif&&e(Notif,{msg:notif.msg,type:notif.type,onClose:()=>setNotif(null)}),
      loading&&e('div',{style:{position:'absolute',top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${C.blue},${C.cyan},${C.purple},${C.blue})`,backgroundSize:'200%',animation:'shimmer 1.5s linear infinite',zIndex:100}}),
      (pages[view]||(()=>null))()));
}

// ── MOUNT ─────────────────────────────────────────────────
try{
  ReactDOM.render(e(App),document.getElementById('root'));
}catch(err){
  document.getElementById('root').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;font-family:sans-serif;color:#ff3b5c;"><div style="font-size:48px">⚠️</div><div style="font-size:18px;font-weight:700">Error al cargar la app</div><div style="font-size:13px;color:#6b7a99;max-width:400px;text-align:center">${err.message}</div></div>`;
  console.error('GTAHUB Error:', err);
}
</script>
</body>
</html>
