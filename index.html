<style>

  --green:#22C55E;--red:#EF4444;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'Barlow',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bk);color:var(--wh);font-size:15px;line-height:1.55;overflow:hidden}
button,input,select,textarea{font-family:inherit;color:inherit;background:none;border:none;outline:none}
button{cursor:pointer}

.font-n{font-family:'Nunito',sans-serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

@keyframes blink{0%,93%,97%,100%{transform:scaleY(1)}95%{transform:scaleY(.06)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes ring{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.15);opacity:.05}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spk{0%{opacity:0}20%{opacity:.7}100%{opacity:0;transform:translate(var(--tx,20px),var(--ty,-50px))}}
.mascot-glow{animation:glow 3.5s ease-in-out infinite}
.eye-b{animation:blink 5s ease-in-out infinite;transform-origin:center}
.app{
  position:fixed;inset:0;display:flex;flex-direction:column;
  max-width:480px;margin:0 auto;background:var(--bk);

}
.view{flex:1;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;animation:fadeIn .2s ease}
.appbar{
  display:flex;align-items:center;gap:8px;padding:14px 16px 10px;
  background:linear-gradient(180deg,var(--d2),rgba(21,14,18,.85));
  border-bottom:1px solid var(--gr1);position:sticky;top:0;z-index:50;backdrop-filter:blur(10px)
}
.appbar-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:radial-gradient(ellipse at 40% 30%,#8A1228,#3A0412)}

.counter{display:inline-flex;align-items:center;gap:4px;background:var(--d3);border:1px solid var(--gr1);border-radius:14px;padding:3px 9px;font-size:11px;font-weight:800;letter-spacing:.3px}

.nav button{flex:1;padding:10px 4px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--gr4);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:color .15s;position:relative}

.dot-pulse{width:8px;height:8px;border-radius:50%;animation:pulse 1.6s ease infinite}
.menu-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--gr1);width:100%;text-align:left;transition:background .1s}

.bubble{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px 14px 14px 4px;padding:12px 14px;font-size:13px;line-height:1.55;color:var(--gr5);max-width:90%}
.bubble strong{color:var(--ambb);font-family:'Nunito';font-weight:800}
.bubble-me{margin-left:auto;background:var(--gd);color:var(--wh);border-radius:14px 14px 4px 14px;border-color:rgba(155,16,53,.3)}
.leaflet-container{background:var(--d1)!important;height:100%;width:100%}
.leaflet-control-attribution{font-size:9px!important;background:rgba(6,4,6,.7)!important;color:var(--gr3)!important}

.leaflet-control-zoom a{background:var(--d2)!important;color:var(--wh)!important;border-color:var(--gr1)!important}
.pin{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 4px 12px rgba(0,0,0,.6),0 0 0 2px rgba(255,255,255,.15)}
.pin>*{transform:rotate(45deg)}
.pin-amb{background:linear-gradient(135deg,var(--amb),var(--ambd))}
.pin-t{background:linear-gradient(135deg,var(--tb),var(--td))}
.pin-res{background:linear-gradient(135deg,var(--green),#0a8a3e);opacity:.55}
.fab{position:absolute;bottom:18px;right:16px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--gb),var(--g));display:flex;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(155,16,53,.55),0 0 0 1px rgba(255,255,255,.06);z-index:400;transition:transform .12s}
.fab:active{transform:scale(.95)}
.fab-2{position:absolute;bottom:84px;right:24px;width:38px;height:38px;border-radius:50%;background:var(--d2);border:1px solid var(--gr2);display:flex;align-items:center;justify-content:center;z-index:400}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 24px;color:var(--gr4)}
/* ── Hero / Brand ────────────────────────────────────────── */
.wm{font-family:'Nunito',sans-serif;font-weight:800;letter-spacing:-.3px;line-height:1}
.wm-sub{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.home-hero{position:relative;padding:24px 16px 18px;overflow:hidden;border-bottom:1px solid var(--gr1);background:var(--bk)}
.home-hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(var(--gl) 1px,transparent 1px),linear-gradient(90deg,var(--gl) 1px,transparent 1px);background-size:36px 36px;opacity:.5;pointer-events:none;-webkit-mask-image:radial-gradient(ellipse at center,black 30%,transparent 80%);mask-image:radial-gradient(ellipse at center,black 30%,transparent 80%)}
.home-hero::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 35%,rgba(101,8,31,.32) 0%,transparent 70%);pointer-events:none}
.home-hero-c{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.brand-big{font-family:'Nunito',sans-serif;font-weight:900;font-size:32px;line-height:.95;letter-spacing:-.5px;margin:6px 0 2px}
.brand-big .h1{color:var(--wh)}
.brand-big .h2{background:linear-gradient(135deg,var(--gb),var(--g),var(--gd));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tag-up{font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gr3)}
.tag-tagline{font-size:13px;font-weight:300;color:var(--gr5);max-width:340px;line-height:1.55;margin-top:4px}
.chips-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.h-chip{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gr3);border:1px solid var(--gr1);padding:5px 10px;border-radius:2px}
.sparks{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.spark{position:absolute;border-radius:50%;animation:spk var(--dur,4s) ease-in-out infinite;opacity:0}
/* Wordmark light variant (for future light mode) */
.wm-light .h1{color:#1A0A12!important}
.wm-light .h2{color:#666!important;font-weight:400}

.spinner{width:22px;height:22px;border:2px solid var(--gr2);border-top-color:var(--gb);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.report-photo{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;border:1px solid var(--gr1)}
.hidden{display:none!important}
@media (max-width:480px){.app{box-shadow:none}}
</style>

<body>
<div id="root"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   ApagonesMid · v1
   Configura tu proyecto Supabase abajo. Si lo dejas vacío,
   la app corre con datos mock (Mérida) para demo.
   Schema SQL: ver /supabase/schema.sql
═══════════════════════════════════════════════════════════════ */
const SUPABASE_URL = "";          // ej. "https://xxxxx.supabase.co"
const SUPABASE_ANON_KEY = "";     // anon public key
const MERIDA = { lat: 20.9670, lng: -89.5926, zoom: 13 };
const REMINDER_HOURS = 24;        // horas para preguntar "¿ya se resolvió?"

const {useState, useEffect, useRef, useCallback, useMemo} = React;
const e = React.createElement;

/* ── DEVICE ID (anon) ──────────────────────────────────────── */
const DEVICE_ID = (()=>{ try{
  let d = localStorage.getItem('amid_did');
  if(!d){ d = 'd_' + Math.random().toString(36).slice(2,10) + Date.now().toString(36); localStorage.setItem('amid_did', d); }
  return d;
}catch{ return 'd_anon_' + Date.now(); }})();

/* ── SUPABASE CLIENT ──────────────────────────────────────── */
const SB = (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {auth:{persistSession:false}})
  : null;
const useMock = !SB;

/* ── MOCK DATA (Mérida) ────────────────────────────────────── */
const MOCK_REPORTS = [
  { id:'m1', type:'water',  subtype:'leak',     lat:20.9710, lng:-89.6230, zone:'García Ginerés',  severity:'moderate', status:'active',   reported_at:new Date(Date.now()-3.2*3600e3).toISOString(), confirmations_count:7,  description:'Fuga grande en la calle 33 con 66' },
  { id:'m2', type:'water',  subtype:'outage',   lat:20.9512, lng:-89.6021, zone:'Centro',          severity:'critical', status:'active',   reported_at:new Date(Date.now()-1.5*3600e3).toISOString(), confirmations_count:14, description:'Sin agua desde anoche' },
  { id:'m3', type:'water',  subtype:'pressure', lat:20.9820, lng:-89.6100, zone:'Itzimná',         severity:'low',      status:'active',   reported_at:new Date(Date.now()-6*3600e3).toISOString(),   confirmations_count:2,  description:'Presión baja en colonia' },
  { id:'m4', type:'power',  subtype:'home',     lat:20.9605, lng:-89.5762, zone:'Francisco de Montejo', severity:'moderate', status:'resolved', reported_at:new Date(Date.now()-26*3600e3).toISOString(),  resolved_at:new Date(Date.now()-2*3600e3).toISOString(), confirmations_count:9,  description:'Apagón sector norte' },
  { id:'m5', type:'water',  subtype:'leak',     lat:20.9410, lng:-89.6310, zone:'Pacabtún',        severity:'moderate', status:'active',   reported_at:new Date(Date.now()-9*3600e3).toISOString(),   confirmations_count:4,  description:'Fuga banqueta' },
  { id:'m6', type:'power',  subtype:'lighting', lat:20.9755, lng:-89.5980, zone:'México Norte',    severity:'low',      status:'active',   reported_at:new Date(Date.now()-22*3600e3).toISOString(),  confirmations_count:1,  description:'Foco de poste fundido' },
];

/* ── API LAYER ─────────────────────────────────────────────── */
const api = {
  async listReports(){
    if(useMock) return MOCK_REPORTS.slice();
    const {data, error} = await SB.from('reports_public').select('*').order('reported_at',{ascending:false}).limit(500);
    if(error){ console.error(error); return []; }
    return data || [];
  },
  async createReport(r){
    if(useMock){
      const nr = { id:'l_'+Date.now(), reported_at:new Date().toISOString(), confirmations_count:0, status:'active', ...r };
      MOCK_REPORTS.unshift(nr);
      return nr;
    }
    const {data, error} = await SB.from('reports').insert(r).select().single();
    if(error) throw error;
    return data;
  },
  async confirmReport(reportId, kind){
    if(useMock){
      const m = MOCK_REPORTS.find(x=>x.id===reportId);
      if(m){
        if(kind==='resolved'){ m.status='resolved'; m.resolved_at=new Date().toISOString(); }
        else { m.confirmations_count = (m.confirmations_count||0)+1; }
      }
      return true;
    }
    const {error} = await SB.from('confirmations').insert({report_id:reportId, device_id:DEVICE_ID, kind});
    if(error && !String(error.message||'').includes('duplicate')) throw error;
    return true;
  },
  async saveProfile(p){
    if(useMock) return {id:'p_'+Date.now(), ...p};
    const {data, error} = await SB.from('profiles').insert(p).select().single();
    if(error) throw error;
    return data;
  },
  subscribeRealtime(onChange){
    if(useMock) return ()=>{};
    const ch = SB.channel('reports-feed')
      .on('postgres_changes',{event:'*',schema:'public',table:'reports'}, onChange)
      .subscribe();
    return ()=>SB.removeChannel(ch);
  }
};

/* ── HELPERS ───────────────────────────────────────────────── */
const TYPE_META = {
  power: { label:'Sin luz',  color:'var(--amb)', emoji:'⚡', subtypes:{ home:'En casa', lighting:'Alumbrado público' } },
  water: { label:'Sin agua', color:'var(--tb)',  emoji:'💧', subtypes:{ leak:'Fuga', outage:'Corte', pressure:'Presión', quality:'Calidad' } }
};
const SEV_META = {
  low:      { label:'Leve',     color:'var(--green)', dot:'#22C55E' },
  moderate: { label:'Moderado', color:'var(--amb)',   dot:'#F5A623' },
  critical: { label:'Crítico',  color:'var(--red)',   dot:'#EF4444' }
};
const fmtAgo = (iso)=>{
  if(!iso) return '';
  const s = (Date.now()-new Date(iso).getTime())/1000;
  if(s<60) return 'hace un momento';
  if(s<3600) return `hace ${Math.floor(s/60)} min`;
  if(s<86400) return `hace ${Math.floor(s/3600)} h`;
  return `hace ${Math.floor(s/86400)} d`;
};
const haversine = (a,b)=>{
  const R=6371,toR=x=>x*Math.PI/180;
  const dLat=toR(b.lat-a.lat),dLng=toR(b.lng-a.lng);
  const x=Math.sin(dLat/2)**2+Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
};

/* ── SVG: GLOBAL DEFS (idénticas al manual de identidad v4) ── */
function GlobalDefs(){
  return e('svg',{width:0,height:0,style:{position:'absolute'},'aria-hidden':true},
    e('defs',null,
      // Guinda bolt gradient (small details + screw)
      e('linearGradient',{id:'bG',x1:14,y1:6,x2:38,y2:46,gradientUnits:'userSpaceOnUse'},
        e('stop',{offset:'0%',stopColor:'#9B1035'}),
        e('stop',{offset:'100%',stopColor:'#5C0120'})
      ),
      // Yellow lightning (mascot crown bolt)
      e('linearGradient',{id:'lG',x1:0,y1:0,x2:0,y2:1},
        e('stop',{offset:'0%',stopColor:'#FFF176'}),
        e('stop',{offset:'45%',stopColor:'#FFD700'}),
        e('stop',{offset:'100%',stopColor:'#E8970A'})
      ),
      // Bulb body (Apagoncito)
      e('linearGradient',{id:'bul',x1:80,y1:65,x2:145,y2:175,gradientUnits:'userSpaceOnUse'},
        e('stop',{offset:'0%',stopColor:'#FFE088'}),
        e('stop',{offset:'40%',stopColor:'#F5A623'}),
        e('stop',{offset:'100%',stopColor:'#C07B10'})
      ),
      // Base / screw gold gradient

/* ── Sparks (chispitas del hero · manual v4) ──────────────── */
function Sparks({count=14}){
  const sparks = useMemo(()=>Array.from({length:count},()=>{
    const guinda = Math.random() > .55;
    const size = 2 + Math.random()*3;
    return {
      left: Math.random()*100, top: Math.random()*100, size,
      color: guinda ? '#9B1035' : '#FFD700',
      dur: 3 + Math.random()*4, delay: Math.random()*5,
      tx: -25 + Math.random()*50, ty: -50 - Math.random()*60
    };
  }),[count]);
  return e('div',{className:'sparks'},
    sparks.map((s,i)=>e('div',{key:i,className:'spark',style:{
      left:s.left+'%',top:s.top+'%',width:s.size,height:s.size,
      background:s.color,boxShadow:`0 0 ${s.size*2}px ${s.color}`,
      animationDuration:s.dur+'s',animationDelay:s.delay+'s',
      '--tx':s.tx+'px','--ty':s.ty+'px'
    }}))
  );
}

/* ═══════════════════════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════════════════════ */
function App(){
  const [view, setView] = useState('home');             // home | map | chat | menu
  const [reports, setReports] = useState([]);
  const [loading, setLoading] = useState(true);
  const [reportFlow, setReportFlow] = useState(null);   // {type, subtype, lat, lng, ...} | null
  const [detail, setDetail] = useState(null);           // selected report
  const [toast, setToast] = useState(null);
  const [reminderQueue, setReminderQueue] = useState([]);

  const showToast = useCallback((msg, kind='info')=>{
    setToast({msg, kind});
    setTimeout(()=>setToast(t=>t?.msg===msg?null:t), 3200);
  },[]);

  useEffect(()=>{
    let mounted=true;
    api.listReports().then(d=>{ if(mounted){ setReports(d); setLoading(false); } }).catch(err=>{ console.error(err); setLoading(false); });
    const unsub = api.subscribeRealtime(()=>{ api.listReports().then(setReports); });
    return ()=>{ mounted=false; unsub(); };
  },[]);

  // Check for own reports needing reminder
  useEffect(()=>{
    try{
      const mine = JSON.parse(localStorage.getItem('amid_mine')||'[]');
      const dismissed = JSON.parse(localStorage.getItem('amid_dismissed_reminders')||'[]');
      const pending = mine
        .map(m=>reports.find(r=>r.id===m.id))
        .filter(r=>r && r.status==='active' && !dismissed.includes(r.id))
        .filter(r=>(Date.now()-new Date(r.reported_at).getTime())/3600e3 >= REMINDER_HOURS);
      setReminderQueue(pending);
    }catch{}
  },[reports]);

  const counts = useMemo(()=>{
    const active = reports.filter(r=>r.status==='active');
    return { power: active.filter(r=>r.type==='power').length, water: active.filter(r=>r.type==='water').length };
  },[reports]);

  const openReportFlow = (type)=>setReportFlow({type, step:1, subtype:null, lat:null, lng:null, severity:'moderate', description:'', name:'', phone:'', photo:null});

  return e('div',{className:'app'},
    e(GlobalDefs),
    e('header',{className:'appbar'},
      e(Wordmark,{iconSize:24,fontSize:15,gap:9}),
      e('div',{style:{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}},
        e('span',{className:'counter apag'}, Ic.bolt(10,'currentColor'),' ',counts.power),
        e('span',{className:'counter agua'}, Ic.drop(10,'currentColor'),' ',counts.water)
      )
    ),
    e('main',{className:'view', key:view},
      view==='home' && e(Home,{reports,openReportFlow,setView,setDetail,loading}),
      view==='map'  && e(MapView,{reports,setDetail,openReportFlow}),
      view==='chat' && e(Chat,{reports,counts,setView,openReportFlow}),
      view==='menu' && e(Menu,{showToast})
    ),
    e('nav',{className:'nav'},
      [{id:'home',label:'Inicio',ic:Ic.home},{id:'map',label:'Mapa',ic:Ic.map},{id:'chat',label:'Apagoncito',ic:Ic.chat},{id:'menu',label:'Menú',ic:Ic.menu}]
        .map(n=>e('button',{key:n.id,className:view===n.id?'on':'',onClick:()=>setView(n.id)},
          n.ic(18, view===n.id?'#fff':'var(--gr4)'),
          e('span',null,n.label)
        ))
    ),
    reportFlow && e(ReportFlow,{state:reportFlow, setState:setReportFlow, onClose:()=>setReportFlow(null), onDone:async(payload)=>{
      try{
        let profileId = null;
        if(payload.name || payload.phone){
          const p = await api.saveProfile({name:payload.name||null, phone:payload.phone||null});
          profileId = p.id;
        }
        const r = await api.createReport({
          type: payload.type, subtype: payload.subtype,
          lat: payload.lat, lng: payload.lng,
          zone: payload.zone || null, severity: payload.severity,
          description: payload.description || null,
          reporter_id: profileId, photo_url: payload.photo || null
        });
        const mine = JSON.parse(localStorage.getItem('amid_mine')||'[]');
        mine.push({id:r.id, at:Date.now()});
        localStorage.setItem('amid_mine', JSON.stringify(mine));
        setReports(prev=>[r, ...prev]);
        setReportFlow(null);
        showToast('Reporte enviado · Gracias por tu voz', 'ok');
      }catch(err){
        console.error(err); showToast('No se pudo enviar el reporte', 'err');
      }
    }}),
    detail && e(Detail,{report:detail, onClose:()=>setDetail(null), onConfirm:async(kind)=>{
      try{
        await api.confirmReport(detail.id, kind);
        showToast(kind==='resolved'?'Gracias · Reporte marcado como resuelto':'Gracias por corroborar','ok');
        const fresh = await api.listReports(); setReports(fresh);
        if(kind==='resolved') setDetail(null);
      }catch(err){ console.error(err); showToast('No se pudo confirmar','err'); }
    }}),
    reminderQueue[0] && e(Reminder,{report:reminderQueue[0],
      onYes:async()=>{
        await api.confirmReport(reminderQueue[0].id,'resolved');
        showToast('Gracias por confirmar la reparación','ok');
        const fresh = await api.listReports(); setReports(fresh);
        setReminderQueue(q=>q.slice(1));
      },
      onLater:()=>setReminderQueue(q=>q.slice(1)),
      onMute:()=>{
        const dismissed = JSON.parse(localStorage.getItem('amid_dismissed_reminders')||'[]');
        dismissed.push(reminderQueue[0].id);
        localStorage.setItem('amid_dismissed_reminders', JSON.stringify(dismissed));
        setReminderQueue(q=>q.slice(1));
      }
    }),
    toast && e('div',{className:`toast ${toast.kind}`},
      e('span',{className:'dot-pulse',style:{background:'currentColor'}}), toast.msg)
  );
}

function MapView({reports, setDetail, openReportFlow}){
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef([]);

  useEffect(()=>{
    if(!containerRef.current || mapRef.current) return;
    const m = L.map(containerRef.current,{zoomControl:true,attributionControl:true}).setView([MERIDA.lat, MERIDA.lng], MERIDA.zoom);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
      maxZoom:19,
      attribution:'© OpenStreetMap · CARTO'
    }).addTo(m);
    mapRef.current = m;
    setTimeout(()=>m.invalidateSize(),50);
  },[]);

  useEffect(()=>{
    const m = mapRef.current; if(!m) return;
    markersRef.current.forEach(mk=>m.removeLayer(mk));
    markersRef.current = [];
    reports.forEach(r=>{
      const cls = r.status==='resolved' ? 'pin-res' : (r.type==='power' ? 'pin-amb' : 'pin-t');
      const html = `<div class="pin ${cls}">${r.type==='power'?'⚡':'💧'}</div>`;
      const icon = L.divIcon({ html, className:'', iconSize:[34,34], iconAnchor:[17,30] });
      const mk = L.marker([r.lat, r.lng],{icon}).addTo(m);
      mk.on('click',()=>setDetail(r));
      markersRef.current.push(mk);
    });
  },[reports, setDetail]);

  const locate = ()=>{
    if(!navigator.geolocation || !mapRef.current) return;
    navigator.geolocation.getCurrentPosition(p=>{
      mapRef.current.flyTo([p.coords.latitude, p.coords.longitude], 15);
    });
  };

  return e('div',{style:{flex:1,position:'relative',display:'flex',flexDirection:'column'}},
    e('div',{style:{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',borderBottom:'1px solid var(--gr1)',background:'var(--d2)'}},
      Ic.search(14,'var(--gr4)'),
      e('input',{className:'field',placeholder:'Buscar colonia o calle…',style:{padding:'7px 10px',fontSize:12,background:'var(--d3)'}})
    ),
    e('div',{ref:containerRef,style:{flex:1,position:'relative'}}),
    e('button',{className:'fab-2',onClick:locate,title:'Mi ubicación'}, Ic.pin(18,'var(--gr5)')),
    e('button',{className:'fab',onClick:()=>openReportFlow('water')}, Ic.plus(26,'#fff'))
  );
}

/* ═══════════════════════════════════════════════════════════════
   REPORT FLOW · 3 pasos
═══════════════════════════════════════════════════════════════ */
function ReportFlow({state, setState, onClose, onDone}){
  const t = TYPE_META[state.type];
  const step = state.step;
  const totalSteps = 3;
  const set = (patch)=>setState(s=>({...s, ...patch}));

  const canNext = step===1
    ? !!state.subtype
    : step===2
      ? state.lat!=null && state.lng!=null
      : !!state.severity;

  return e('div',{className:'sheet',onClick:onClose},
    e('div',{className:'sheet-inner',onClick:ev=>ev.stopPropagation()},
      e('div',{className:'sheet-pill'}),
      e('div',{className:'progress'},
        Array.from({length:totalSteps}).map((_,i)=>e('div',{key:i,className:`progress-bar ${i<step-1?'done':i===step-1?'active':''}`}))
      ),
      step===1 && e(StepType,{state,set,t}),
      step===2 && e(StepLocation,{state,set,t}),
      step===3 && e(StepDetails,{state,set,t}),
      e('div',{style:{display:'grid',gridTemplateColumns:step===1?'1fr 2fr':'1fr 2fr',gap:8,marginTop:14}},
        e('button',{className:'btn btn-gh',onClick:()=>step===1 ? onClose() : set({step:step-1})}, step===1?'Cancelar':e('span',null, Ic.arrow(12,'currentColor','left'),' Atrás')),
        e('button',{className:'btn btn-p',disabled:!canNext,style:{background:canNext?'var(--g)':'var(--gr2)',color:canNext?'#fff':'var(--gr4)'},onClick:()=>{
          if(step<totalSteps) set({step:step+1});
          else onDone(state);
        }}, step<totalSteps ? e('span',null,'Continuar ',Ic.arrow(12,'currentColor')) : `Reportar ${t.label} 📍`)
      )
    )
  );
}

function StepType({state,set,t}){
  return e('div',null,
    e('div',{className:'h1'}, '¿Qué está pasando?'),
    e('div',{className:'sub'}, 'Selecciona el tipo de incidencia'),
    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}},
      ['power','water'].map(k=>{
        const tm = TYPE_META[k]; const sel = state.type===k;
        return e('button',{key:k,className:`card ${sel?(k==='power'?'sel-amb':'sel-t'):''}`,style:{textAlign:'center',padding:14},onClick:()=>set({type:k, subtype:null})},
          e('div',{style:{width:34,height:34,borderRadius:8,margin:'0 auto 6px',display:'flex',alignItems:'center',justifyContent:'center',background:sel?'var(--g)':'var(--d3)'}},
            e('span',{style:{fontSize:18}}, tm.emoji)),
          e('div',{className:'font-n',style:{fontWeight:900,fontSize:13,color:tm.color}}, tm.label.toUpperCase()),
          e('div',{style:{fontSize:10,color:'var(--gr4)',marginTop:2}}, k==='power'?'Sin electricidad':'Fuga, corte o calidad')
        );
      })
    ),
    e('div',{className:'lbl-up',style:{color:t.color,display:'flex',alignItems:'center',gap:6}}, t.emoji,' ¿', state.type==='power'?'DÓNDE NO HAY LUZ':'QUÉ PASA CON EL AGUA', '?'),
    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
      Object.entries(t.subtypes).map(([k,label])=>{
        const sel = state.subtype===k;
        const cls = state.type==='power' ? (sel?'sel-amb':'') : (sel?'sel-t':'');
        return e('button',{key:k,className:`card ${cls}`,style:{textAlign:'center',padding:'12px 8px'},onClick:()=>set({subtype:k})},
          e('div',{className:'font-n',style:{fontWeight:800,fontSize:12,color:t.color}}, label),
        );
      })
    )
  );
}

function StepLocation({state,set,t}){
  const ref = useRef(null), mapRef=useRef(null), markerRef=useRef(null);
  const [mode,setMode] = useState(state.lat?null:null);

  useEffect(()=>{
    if(mode!=='pick' || !ref.current || mapRef.current) return;
    const m = L.map(ref.current,{zoomControl:false,attributionControl:false}).setView([state.lat||MERIDA.lat,state.lng||MERIDA.lng], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(m);
    mapRef.current = m;
    setTimeout(()=>m.invalidateSize(),50);
    if(state.lat){
      markerRef.current = L.marker([state.lat,state.lng]).addTo(m);
    }
    m.on('click',(ev)=>{
      if(markerRef.current) m.removeLayer(markerRef.current);
      markerRef.current = L.marker(ev.latlng).addTo(m);
      set({lat:ev.latlng.lat, lng:ev.latlng.lng});
    });
    return ()=>{ m.remove(); mapRef.current=null; };
  },[mode]);

  const useGPS = ()=>{
    if(!navigator.geolocation){ alert('Tu navegador no soporta GPS'); return; }
    navigator.geolocation.getCurrentPosition(
      p=>{ set({lat:p.coords.latitude, lng:p.coords.longitude}); setMode('gps'); },
      err=>{ alert('No pudimos obtener tu ubicación: '+err.message); }
    );
  };

  return e('div',null,
    e('div',{className:'h1'}, '¿Dónde ocurre?'),
    e('div',{className:'sub'}, 'Ubica el problema en el mapa'),
    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}},
      e('button',{className:`card ${mode==='gps'?'sel-amb':''}`,style:{display:'flex',alignItems:'center',gap:10,padding:12,textAlign:'left'},onClick:useGPS},
        e('span',{style:{fontSize:20}}, '📍'),
        e('div',null, e('div',{style:{fontWeight:700,fontSize:12}},'Mi ubicación'), e('div',{style:{fontSize:10,color:'var(--gr4)'}},'GPS automático'))
      ),
      e('button',{className:`card ${mode==='pick'?'sel-amb':''}`,style:{display:'flex',alignItems:'center',gap:10,padding:12,textAlign:'left'},onClick:()=>setMode('pick')},
        e('span',{style:{fontSize:20}}, '🗺️'),
        e('div',null, e('div',{style:{fontWeight:700,fontSize:12}},'Marcar mapa'), e('div',{style:{fontSize:10,color:'var(--gr4)'}},'Toca ubicación'))
      )
    ),
    mode==='pick' && e('div',{ref,style:{height:220,borderRadius:10,overflow:'hidden',border:'1px solid var(--gr1)',marginBottom:10}}),
    state.lat
      ? e('div',{style:{background:'rgba(34,197,94,.08)',border:'1px solid rgba(34,197,94,.25)',borderRadius:9,padding:'9px 12px',fontSize:11,color:'var(--green)',display:'flex',alignItems:'center',gap:8}}, Ic.check(14,'var(--green)'),' Ubicación lista · ',state.lat.toFixed(4),', ',state.lng.toFixed(4))
      : e('div',{style:{background:'var(--d3)',border:'1px solid var(--gr1)',borderRadius:9,padding:'11px',fontSize:11,color:'var(--gr4)',display:'flex',gap:6}}, '📌 Elige cómo ubicar tu reporte')
  );
}

function StepDetails({state,set,t}){
  const onPhoto = (ev)=>{

    e('div',{className:'h1'}, 'Datos del reporte'),

    e('div',{className:'sev-row',style:{marginBottom:14}},
      Object.entries(SEV_META).map(([k,sv])=>e('button',{key:k,className:`sev ${state.severity===k?'on':''}`,onClick:()=>set({severity:k})},
        e('span',{className:'dot',style:{background:sv.dot}}), sv.label
      ))
    ),
    e('span',{className:'lbl-up'}, '📸 Foto del corte (opcional)'),
    state.photo
      ? e('div',{style:{position:'relative',marginBottom:12}},
          e('img',{src:state.photo,className:'report-photo'}),
          e('button',{onClick:()=>set({photo:null}),style:{position:'absolute',top:6,right:6,background:'rgba(0,0,0,.75)',borderRadius:'50%',width:26,height:26,display:'flex',alignItems:'center',justifyContent:'center'}}, Ic.x(12,'#fff'))
        )
      : e('label',{style:{display:'block',background:'var(--d3)',border:'1px dashed var(--gr2)',borderRadius:9,padding:16,textAlign:'center',marginBottom:12,cursor:'pointer'}},
          Ic.cam(22,'var(--gr4)'),

          e('input',{type:'file',accept:'image/*',capture:'environment',onChange:onPhoto,style:{display:'none'}})
        ),
    e('span',{className:'lbl-up'}, 'Comentario (opcional)'),
    e('textarea',{className:'field',rows:2,placeholder:'¿Algo más que debamos saber?',value:state.description,onChange:ev=>set({description:ev.target.value}),style:{marginBottom:10,resize:'none'}}),
    e('span',{className:'lbl-up'}, 'Tu nombre (privado)'),
    e('input',{className:'field',placeholder:'Ej. María González',value:state.name,onChange:ev=>set({name:ev.target.value}),style:{marginBottom:10}}),
    e('span',{className:'lbl-up'}, 'Teléfono / WhatsApp (privado)'),
    e('input',{className:'field',type:'tel',placeholder:'+52 999 123 4567',value:state.phone,onChange:ev=>set({phone:ev.target.value})}),
    e('div',{style:{background:'rgba(11,168,196,.08)',border:'1px solid rgba(11,168,196,.2)',borderRadius:9,padding:'10px 12px',marginTop:12,display:'flex',gap:8,alignItems:'flex-start'}},
      e('span',{style:{fontSize:13}}, '🔒'),
      e('div',{style:{fontSize:10,color:'var(--gr5)',lineHeight:1.5}}, 'Tu nombre y teléfono son ',e('strong',null,'privados'),'. Solo los ve el administrador. Nunca aparecen en el mapa.')
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   CHAT · Apagoncito
═══════════════════════════════════════════════════════════════ */
function Chat({reports, counts, setView, openReportFlow}){
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const scrollRef = useRef(null);

  const greet = useMemo(()=>{
    if(counts.power===0 && counts.water===0) return 'No hay reportes activos en Mérida ahora mismo. ¡Buen momento! ☀️';
    const partes = [];
    if(counts.power>0) partes.push(`${counts.power} reporte${counts.power!==1?'s':''} de apagones`);
    if(counts.water>0) partes.push(`${counts.water} reporte${counts.water!==1?'s':''} de agua`);
    return `Ahora mismo hay ${partes.join(' y ')} en Mérida.`;
  },[counts]);

  useEffect(()=>{
    setMsgs([{from:'bot', text:`**Apagoncito** aquí. ${greet} ¿En qué te ayudo?`}]);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  useEffect(()=>{ if(scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; },[msgs]);

  const reply = (q)=>{
    const k = q.toLowerCase();
    const active = reports.filter(r=>r.status==='active');
    if(/apag|luz|electric|cfe/.test(k)){
      const pw = active.filter(r=>r.type==='power');
      if(!pw.length) return 'Sin apagones activos en Mérida ahora ⚡✅';
      const top = pw.slice(0,3).map(r=>`• ${r.zone||'Mérida'} (${fmtAgo(r.reported_at)})`).join('\n');
      return `${pw.length} apagón${pw.length!==1?'es':''} activos:\n${top}`;
    }
    if(/agua|fuga|japay/.test(k)){
      const w = active.filter(r=>r.type==='water');
      if(!w.length) return 'Sin reportes de agua activos 💧✅';
      const top = w.slice(0,3).map(r=>`• ${r.zone||'Mérida'} — ${TYPE_META.water.subtypes[r.subtype]||'reporte'} (${fmtAgo(r.reported_at)})`).join('\n');
      return `${w.length} reporte${w.length!==1?'s':''} de agua:\n${top}`;
    }
    if(/zona|colonia|cerca|mi /.test(k)){
      const byZone = {};
      active.forEach(r=>{ if(r.zone){ byZone[r.zone] = (byZone[r.zone]||0)+1; } });
      const top = Object.entries(byZone).sort((a,b)=>b[1]-a[1]).slice(0,5);
      if(!top.length) return 'Sin actividad por zona ahora mismo.';
      return 'Top zonas con reportes:\n' + top.map(([z,n])=>`• ${z} — ${n}`).join('\n');
    }
    if(/reportar|nuevo|crear/.test(k)){
      return 'Claro. ¿Es **sin luz** o **sin agua**? Usa los botones de inicio o el botón ➕ en el mapa.';
    }
    if(/hola|hi|hey|buen/.test(k)){
      return `¡Hola! ${greet} Puedes preguntarme por *apagones*, *agua*, *zonas* o *cómo reportar*.`;
    }
    return `Puedes preguntarme por: *apagones*, *agua*, *mi zona*, *top zonas* o *cómo reportar*. ${greet}`;
  };

  const send = (txt)=>{
    const t = (txt||input).trim(); if(!t) return;
    setMsgs(m=>[...m,{from:'me',text:t}]);
    setInput('');
    setTimeout(()=>setMsgs(m=>[...m,{from:'bot', text: reply(t)}]), 320);
  };

  return e('div',{style:{display:'flex',flexDirection:'column',flex:1,minHeight:0}},
    e('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',borderBottom:'1px solid var(--gr1)',background:'linear-gradient(160deg,var(--d4),#1A1020)'}},
      e('div',{style:{width:46,height:46,position:'relative'}},
        e('div',{style:{position:'absolute',inset:-3,borderRadius:'50%',border:'1px solid rgba(245,166,35,.18)',animation:'ring 3s ease-in-out infinite'}}),
        e(Apagoncito,{size:46})
      ),
      e('div',null,
        e('div',{className:'font-n',style:{fontWeight:900,fontSize:14,background:'linear-gradient(135deg,var(--ambb),var(--amb))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}, 'Apagoncito'),
        e('div',{style:{fontSize:10,color:'var(--gr4)',display:'flex',alignItems:'center',gap:5}},
          e('span',{style:{width:5,height:5,borderRadius:'50%',background:'#22C55E',boxShadow:'0 0 4px #22C55E'}}), 'Asistente · Mérida')
      )
    ),
    e('div',{ref:scrollRef,style:{flex:1,overflowY:'auto',padding:'12px 12px 6px',display:'flex',flexDirection:'column',gap:8}},
      msgs.map((m,i)=>e('div',{key:i,className:`bubble ${m.from==='me'?'bubble-me':''}`,style:{whiteSpace:'pre-line'}},
        m.from==='bot' ? m.text.split('**').map((s,j)=>j%2 ? e('strong',{key:j},s) : s) : m.text
      ))
    ),
    e('div',{style:{display:'flex',gap:6,padding:'4px 12px',overflowX:'auto'}},
      [
        {q:'⚡ Apagones',cls:'amb'},
        {q:'💧 Agua',cls:'t'},
        {q:'Mi zona',cls:''},
        {q:'Top zonas',cls:''},
        {q:'Cómo reportar',cls:''}
      ].map(c=>e('button',{key:c.q,className:`chip ${c.cls}`,onClick:()=>send(c.q)}, c.q))
    ),
    e('div',{style:{display:'flex',gap:8,padding:'10px 12px',borderTop:'1px solid rgba(101,8,31,.3)',background:'var(--d2)'}},
      e('input',{className:'field',style:{borderRadius:20,fontSize:12,padding:'9px 14px'},placeholder:'Pregúntale a Apagoncito…',value:input,onChange:ev=>setInput(ev.target.value),onKeyDown:ev=>{ if(ev.key==='Enter') send(); }}),
      e('button',{onClick:()=>send(),style:{width:38,height:38,borderRadius:'50%',background:'var(--g)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}, Ic.send(15,'#fff'))
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   MENU · Configuración y funciones
═══════════════════════════════════════════════════════════════ */
function Menu({showToast}){
  const [notif, setNotif] = useState(()=>localStorage.getItem('amid_notif')==='1');
  const [lang, setLang] = useState(()=>localStorage.getItem('amid_lang')||'es');

  const toggleNotif = async()=>{
    if(!notif && 'Notification' in window){
      const p = await Notification.requestPermission();
      if(p!=='granted'){ showToast('Permiso denegado para notificaciones','err'); return; }
    }
    const v = !notif; setNotif(v); localStorage.setItem('amid_notif', v?'1':'0');
    showToast(v?'Notificaciones activadas':'Notificaciones desactivadas', v?'ok':'info');
  };

  const items = [
    { key:'notif', emoji:'🔔', label:'Notificaciones', sub:notif?'Activas ✓':'Desactivadas', bg:'#1A2A1A', onClick:toggleNotif },
    { key:'history', emoji:'🕐', label:'Historial de zonas', sub:'Últimos 30 días', bg:'#1A1A2A', onClick:()=>showToast('Historial · próximamente','info') },
    { key:'cfe', emoji:'📞', label:'Reportar a CFE / JAPAY', sub:'Contacto oficial', bg:'#2A1A10', onClick:()=>window.open('tel:071','_self') },
    { key:'911', emoji:'🚨', label:'Emergencias', sub:'CFE · JAPAY · Cruz Roja · 911', bg:'rgba(101,8,31,.3)', onClick:()=>showToast('911 · 071 · 073','info') },
    { key:'ranking', emoji:'📊', label:'Ranking de zonas', sub:'Las más activas este mes', bg:'#1A2010', onClick:()=>showToast('Ranking · próximamente','info') },
    { key:'lang', emoji:'🌐', label:'Idioma · Language · K\'aay', sub:({es:'Español',en:'English',maya:'Maya'}[lang]), bg:'#0A1A20', onClick:()=>{
      const next = lang==='es'?'en':lang==='en'?'maya':'es';
      setLang(next); localStorage.setItem('amid_lang', next);
      showToast(`Idioma: ${ {es:'Español',en:'English',maya:'Maya'}[next] } (i18n próximo)`, 'info');
    }},
    { key:'widget', emoji:'📋', label:'Widget de inicio', sub:'Estado en pantalla inicio', bg:'#201A10', onClick:()=>showToast('Widget · próximamente','info') },
    { key:'bulletin', emoji:'📰', label:'Boletín semanal', sub:'Resumen para medios', bg:'#0A1A15', onClick:()=>showToast('Boletín · próximamente','info') },
    { key:'pdf', emoji:'📄', label:'Carta de queja PDF', sub:'CFE o JAPAY — formal', bg:'#1A1520', onClick:()=>showToast('Generador PDF · próximamente','info') },
  ];

  return e('div',{style:{padding:'10px 0 24px'}},
    e('div',{style:{textAlign:'center',padding:'14px 16px 18px',borderBottom:'1px solid var(--gr1)',marginBottom:6}},
      e('div',{className:'mascot-glow',style:{display:'inline-block'}}, e(Apagoncito,{size:80})),
      e('div',{className:'font-n',style:{fontWeight:900,fontSize:16,marginTop:8}}, '¿Sin luz o sin agua?'),
      e('div',{style:{fontSize:11,color:'var(--gr4)'}}, 'Tu reporte es nuestra voz')
    ),
    items.map(it=>e('button',{key:it.key,className:'menu-item',onClick:it.onClick},
      e('div',{className:'menu-icon',style:{background:it.bg}}, it.emoji),
      e('div',{style:{flex:1,minWidth:0,textAlign:'left'}},
        e('div',{style:{fontWeight:600,fontSize:13,color:'var(--wh)'}}, it.label),
        e('div',{style:{fontSize:11,color:'var(--gr4)',marginTop:1}}, it.sub)
      ),
      e('span',{style:{color:'var(--gr4)',fontSize:18}}, '›')
    )),
    e('div',{style:{padding:'24px 16px 8px',textAlign:'center',color:'var(--gr3)',fontSize:10,letterSpacing:1}},
      'ApagonesMid · v1 · Mérida, Yucatán',
      e('div',{style:{marginTop:4,fontSize:9}}, useMock ? 'Modo demo · datos de ejemplo' : 'Conectado a Supabase')
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   REMINDER · Modal 24h
═══════════════════════════════════════════════════════════════ */
function Reminder({report:r, onYes, onLater, onMute}){
  const t = TYPE_META[r.type];
  const ageH = Math.floor((Date.now()-new Date(r.reported_at).getTime())/3600e3);
  return e('div',{className:'sheet'},
    e('div',{className:'sheet-inner',style:{borderColor:'rgba(101,8,31,.55)'}},
      e('div',{className:'sheet-pill'}),
      e('div',{style:{textAlign:'center'}},
        e('div',{style:{width:54,height:54,background:r.type==='power'?'rgba(245,166,35,.18)':'rgba(11,168,196,.15)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',border:`2px solid ${r.type==='power'?'rgba(245,166,35,.35)':'rgba(11,168,196,.3)'}`,fontSize:22}}, t.emoji),
        e('div',{style:{fontSize:10,fontWeight:700,letterSpacing:2,textTransform:'uppercase',color:'var(--gb)',marginBottom:6}}, 'Recordatorio'),
        e('div',{className:'font-n',style:{fontWeight:900,fontSize:16,marginBottom:8}}, '¿Ya se resolvió ', r.type==='power'?'el apagón':'la fuga', '?'),
        e('div',{style:{fontSize:12,color:'var(--gr5)',marginBottom:14}}, 'Tu reporte de hace ',e('strong',null,ageH,'h'),' en ',e('strong',null,r.zone||'Mérida')),
        e('button',{className:'btn btn-suc',style:{width:'100%',marginBottom:8},onClick:onYes}, Ic.check(14,'#fff'),' Sí, ya se resolvió'),
        e('button',{className:'btn btn-gh',style:{width:'100%',marginBottom:10},onClick:onLater}, '⏳ Aún no — recuérdame después'),
        e('button',{onClick:onMute,style:{fontSize:10,color:'var(--gr3)'}}, 'No mostrar este recordatorio')
      )
    )
  );
}

/* ── MOUNT ─────────────────────────────────────────────────── */
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
