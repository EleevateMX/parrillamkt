// ── ROOT ──────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [view,setView]=useState('dashboard');
  const [props,setProps]=useState([]);
  const [loading,setLoading]=useState(false);
  const [sel,setSel]=useState(null);
  const [toast,setToast]=useState(null);

  useEffect(()=>{
    if(!user) return;
    setLoading(true);
    api.get().then(d=>setProps(d)).catch(()=>setProps(MOCK)).finally(()=>setLoading(false));
  },[user]);

  const showToast=(msg,type='success')=>{setToast({msg,type});setTimeout(()=>setToast(null),3200);};

  if(!user) return e(Login,{onLogin:u=>{setUser(u);setView('dashboard');}});

  const pages={
    dashboard:    ()=>e(Dashboard,    {props,setView,setSel,user}),
    proposals:    ()=>e(Proposals,    {props,setProps,setView,setSel,user,toast:showToast}),
    detail:       ()=>sel?e(Detail,   {initP:sel,props,setProps,setView,user,toast:showToast}):e(Proposals,{props,setProps,setView,setSel,user,toast:showToast}),
    'new-proposal':()=>e(NewProposal,{setProps,setView,user,toast:showToast}),
    parrilla:     ()=>e(Parrilla,     {props,setView,setSel}),
    targets:      ()=>e(Targets,      {}),
    ads:          ()=>e(Ads,          {}),
  };

  return e('div',{style:{display:'flex',height:'100vh',background:C.bg,color:C.ink,overflow:'hidden'}},
    e(Sidebar,{view,setView,user,setUser,props}),
    e('main',{style:{flex:1,overflow:'auto',position:'relative',background:`radial-gradient(ellipse at 80% 5%,${C.blue}06 0%,transparent 40%),${C.bg}`}},
      toast&&e(Toast,{msg:toast.msg,type:toast.type,onClose:()=>setToast(null)}),
      loading&&e('div',{style:{position:'absolute',top:0,left:0,right:0,height:2,zIndex:100,background:`linear-gradient(90deg,${C.blue},${C.cyan},${C.purple})`,overflow:'hidden'}},
        e('div',{style:{position:'absolute',top:0,bottom:0,width:'40%',background:'rgba(255,255,255,.3)',animation:'shimmer 1.2s linear infinite'}})),
      (pages[view]||(()=>null))()));
}

// Render con try/catch para mostrar error visible si falla
try{
  ReactDOM.render(e(App),document.getElementById('root'));
}catch(err){
  document.getElementById('root').innerHTML=
    '<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;font-family:sans-serif;background:#07101e;color:#ff3b5c">'+
    '<div style="font-size:48px">⚠️</div>'+
    '<div style="font-size:18px;font-weight:700">Error al cargar</div>'+
    '<div style="font-size:12px;color:#6b7a99;max-width:400px;text-align:center;font-family:monospace;background:#0c1524;padding:12px 16px;border-radius:8px">'+err.message+'</div>'+
    '</div>';
  console.error(err);
}
</script>
</body>
