name: Deploy ApagonesMid to GitHub Pages

on:
  push:
    branches:
      - claude/apagones-mid-v1
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Stage site (only what is served)
        run: |
          mkdir -p _site
          cp index.html _site/
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
